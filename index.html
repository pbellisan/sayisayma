<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <!-- Mobil cihazlarda uygulamanın tam ekran ve doğru ölçekte görünmesini sağlar -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#eef2ff" />
    <title>Sayma Oyunu</title>

    <!-- Tailwind CSS (Tasarım için) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React ve ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (React JSX kodunu tarayıcının anlaması için) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; padding: 0; overscroll-behavior: none; user-select: none; -webkit-user-select: none; }
        
        @keyframes wobble {
            0%, 100% { transform: translateX(0%); }
            15% { transform: translateX(-15%) rotate(-5deg); }
            30% { transform: translateX(10%) rotate(3deg); }
            45% { transform: translateX(-10%) rotate(-3deg); }
            60% { transform: translateX(5%) rotate(2deg); }
            75% { transform: translateX(-5%) rotate(-1deg); }
        }
        .animate-wobble { animation: wobble 0.5s ease-in-out; }
        
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        .animate-pop { animation: pop 0.5s ease-in-out infinite; }
        
        @keyframes bounce-in {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-bounce-in { animation: bounce-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- İkonlar (Dışa bağımlılığı kaldırmak için SVG olarak eklendi) ---
        const SvgIcon = ({ children, className, color, fill, strokeWidth = 2, style }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill={fill || "none"} stroke={color || "currentColor"} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={style}>
                {children}
            </svg>
        );

        const Play = (props) => <SvgIcon {...props}><polygon points="6 3 20 12 6 21 6 3"/></SvgIcon>;
        const Award = (props) => <SvgIcon {...props}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></SvgIcon>;
        const Volume2 = (props) => <SvgIcon {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></SvgIcon>;
        const VolumeX = (props) => <SvgIcon {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" x2="15" y1="9" y2="17"/><line x1="15" x2="23" y1="9" y2="17"/></SvgIcon>;
        const Star = (props) => <SvgIcon {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></SvgIcon>;
        const Sparkles = (props) => <SvgIcon {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></SvgIcon>;

        // --- Oyun Verileri (Sevimli Nesneler) ---
        const OBJECTS = [
            { id: 'elma', emoji: '🍎', name: 'elma', color: 'bg-red-100 border-red-300' },
            { id: 'kedi', emoji: '🐱', name: 'kedi', color: 'bg-orange-100 border-orange-300' },
            { id: 'araba', emoji: '🚗', name: 'araba', color: 'bg-blue-100 border-blue-300' },
            { id: 'yildiz', emoji: '⭐', name: 'yıldız', color: 'bg-yellow-100 border-yellow-300' },
            { id: 'balon', emoji: '🎈', name: 'balon', color: 'bg-purple-100 border-purple-300' },
            { id: 'agac', emoji: '🌳', name: 'ağaç', color: 'bg-green-100 border-green-300' }
        ];

        // --- Yardımcı Fonksiyonlar ---
        const shuffleArray = (array) => [...array].sort(() => Math.random() - 0.5);
        const getRandomItem = (array) => array[Math.floor(Math.random() * array.length)];
        const getRandomNumber = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        function App() {
            const [gameState, setGameState] = useState('start');
            const [score, setScore] = useState(0);
            const [soundEnabled, setSoundEnabled] = useState(true);
            const [targetNumber, setTargetNumber] = useState(1);
            const [currentObject, setCurrentObject] = useState(OBJECTS[0]);
            const [options, setOptions] = useState([]);
            const [wrongAnswers, setWrongAnswers] = useState([]);
            const [showSuccess, setShowSuccess] = useState(false);

            const speak = useCallback((text) => {
                if (!soundEnabled || !('speechSynthesis' in window)) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'tr-TR';
                utterance.rate = 0.9; 
                utterance.pitch = 1.3;
                window.speechSynthesis.speak(utterance);
            }, [soundEnabled]);

            const generateRound = useCallback(() => {
                setWrongAnswers([]);
                setShowSuccess(false);
                
                const correctNumber = getRandomNumber(1, 10);
                const selectedObject = getRandomItem(OBJECTS);
                
                setTargetNumber(correctNumber);
                setCurrentObject(selectedObject);

                let wrong1, wrong2;
                do { wrong1 = getRandomNumber(1, 10); } while (wrong1 === correctNumber);
                do { wrong2 = getRandomNumber(1, 10); } while (wrong2 === correctNumber || wrong2 === wrong1);
                
                const newOptions = shuffleArray([
                    { value: correctNumber, isTarget: true },
                    { value: wrong1, isTarget: false },
                    { value: wrong2, isTarget: false }
                ]);
                
                setOptions(newOptions);
                setTimeout(() => speak(`Burada kaç tane ${selectedObject.name} var?`), 300);
            }, [speak]);

            const startGame = () => {
                setScore(0);
                setGameState('playing');
                speak("Hadi sayalım!");
                setTimeout(generateRound, 1000);
            };

            const handleChoice = (option) => {
                if (showSuccess) return;

                if (option.isTarget) {
                    setShowSuccess(true);
                    speak(getRandomItem(["Harika!", "Aferin sana!", "Çok doğru!", "Süpersin!"]));
                    
                    setTimeout(() => {
                        const newScore = score + 1;
                        setScore(newScore);
                        if (newScore >= 5) {
                            setGameState('won');
                            speak("Tebrikler! Bütün sayıları doğru bildin. Sen bir yıldızsın!");
                        } else {
                            generateRound();
                        }
                    }, 2500);
                } else {
                    if (!wrongAnswers.includes(option.value)) {
                        setWrongAnswers(prev => [...prev, option.value]);
                        speak(option.value + " değil. Bir daha say bakalım!");
                    }
                }
            };

            if (gameState === 'start') {
                return (
                    <div className="min-h-screen bg-indigo-50 flex flex-col items-center justify-center p-4 h-screen max-h-screen">
                        <div className="bg-white p-8 rounded-[3rem] shadow-2xl text-center max-w-md w-full border-8 border-indigo-200">
                            <div className="flex justify-center mb-6 gap-2 text-5xl md:text-6xl">
                                🍎 1️⃣ 🐱 2️⃣ ⭐
                            </div>
                            <h1 className="text-4xl md:text-5xl font-black text-indigo-600 mb-4 tracking-tight">SAYMA OYUNU</h1>
                            <p className="text-xl text-slate-600 mb-8 font-medium">Hadi nesneleri sayalım ve doğru rakamı bulalım!</p>
                            
                            <button onClick={startGame} className="w-full bg-pink-500 hover:bg-pink-400 text-white font-bold text-3xl py-6 px-8 rounded-3xl shadow-[0_8px_0_rgb(190,24,93)] hover:translate-y-1 transition-all flex items-center justify-center gap-4 active:shadow-none active:translate-y-2">
                                <Play fill="currentColor" className="w-10 h-10" />
                                BAŞLA
                            </button>
                        </div>
                    </div>
                );
            }

            if (gameState === 'won') {
                return (
                    <div className="min-h-screen bg-yellow-100 flex flex-col items-center justify-center p-4 h-screen max-h-screen">
                        <div className="bg-white p-10 rounded-[3rem] shadow-2xl text-center max-w-md w-full border-8 border-yellow-300 relative overflow-hidden">
                            <div className="flex justify-center mb-6 z-10 relative">
                                <Award className="w-32 h-32 text-yellow-500 animate-bounce" />
                            </div>
                            <h1 className="text-5xl font-black text-orange-500 mb-4 z-10 relative">HARİKA!</h1>
                            <p className="text-2xl text-slate-600 mb-8 font-bold z-10 relative">Tüm sayıları bildin!</p>
                            
                            <div className="flex justify-center gap-2 mb-8 z-10 relative">
                               {[...Array(5)].map((_, i) => (
                                  <Star key={i} className="w-12 h-12 text-yellow-400 fill-yellow-400 animate-pop" style={{animationDelay: `${i * 0.1}s`}} />
                               ))}
                            </div>

                            <button onClick={startGame} className="w-full bg-indigo-500 hover:bg-indigo-400 text-white font-bold text-2xl py-5 px-8 rounded-3xl shadow-[0_8px_0_rgb(67,56,202)] hover:translate-y-1 transition-all active:shadow-none active:translate-y-2 z-10 relative">
                                TEKRAR OYNA
                            </button>
                            
                            <Sparkles className="absolute top-10 left-10 w-16 h-16 text-pink-300 animate-pulse opacity-50" />
                            <Sparkles className="absolute bottom-20 right-10 w-20 h-20 text-blue-300 animate-pulse opacity-50" />
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col font-sans select-none h-screen max-h-screen overflow-hidden">
                    <div className="bg-white p-3 md:p-4 shadow-sm flex justify-between items-center px-4 md:px-8 border-b-4 border-slate-100">
                        <div className="flex items-center gap-2 bg-yellow-100 px-4 py-2 rounded-full border-4 border-yellow-300">
                            <Star className="w-6 h-6 text-yellow-500 fill-yellow-500" />
                            <span className="text-2xl font-black text-yellow-600">{score} / 5</span>
                        </div>
                        
                        <button onClick={() => {
                            setSoundEnabled(!soundEnabled);
                            if(soundEnabled) window.speechSynthesis.cancel();
                        }} className="p-2 md:p-3 bg-slate-100 rounded-full hover:bg-slate-200 transition-colors border-2 border-slate-200">
                            {soundEnabled ? <Volume2 className="w-6 h-6 md:w-8 md:h-8 text-slate-600" /> : <VolumeX className="w-6 h-6 md:w-8 md:h-8 text-slate-400" />}
                        </button>
                    </div>

                    <div className="flex-1 flex flex-col items-center justify-between p-4 md:p-8 max-w-5xl mx-auto w-full h-full overflow-hidden">
                        <div className="mt-2 mb-2 md:mb-4 text-center">
                            <h2 onClick={() => speak(`Burada kaç tane ${currentObject.name} var?`)} className="text-2xl md:text-5xl font-black text-slate-700 cursor-pointer hover:text-indigo-500 transition-colors">
                                {showSuccess ? (
                                   <span className="text-green-500 animate-pop inline-block">Süper! {targetNumber} tane var.</span>
                                ) : (
                                   <span>Kaç tane {currentObject.name} var?</span>
                                )}
                            </h2>
                        </div>

                        <div className={`
                            flex-1 w-full flex items-center justify-center p-4 md:p-8 rounded-[2rem] md:rounded-[3rem] border-8 mb-4 md:mb-8
                            ${currentObject.color} transition-all duration-500 overflow-hidden
                            ${showSuccess ? 'scale-[1.02] shadow-2xl' : 'shadow-inner'}
                        `}>
                            <div className="flex flex-wrap justify-center items-center gap-2 md:gap-6 max-w-3xl overflow-y-auto max-h-full">
                                {Array.from({ length: targetNumber }).map((_, i) => (
                                    <div key={i} className="text-5xl sm:text-6xl md:text-8xl animate-bounce-in drop-shadow-xl" style={{ animationDelay: `${i * 0.1}s` }}>
                                        {currentObject.emoji}
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="grid grid-cols-3 gap-3 md:gap-8 w-full max-w-3xl pb-2">
                            {options.map((option, index) => {
                                const isWrong = wrongAnswers.includes(option.value);
                                const isCorrectAndFound = showSuccess && option.isTarget;
                                const isHidden = showSuccess && !option.isTarget;

                                const btnColors = [
                                    "bg-sky-400 hover:bg-sky-300 shadow-[0_6px_0_rgb(2,132,199)] md:shadow-[0_8px_0_rgb(2,132,199)]", 
                                    "bg-pink-400 hover:bg-pink-300 shadow-[0_6px_0_rgb(190,24,93)] md:shadow-[0_8px_0_rgb(190,24,93)]", 
                                    "bg-emerald-400 hover:bg-emerald-300 shadow-[0_6px_0_rgb(5,150,105)] md:shadow-[0_8px_0_rgb(5,150,105)]"
                                ];

                                return (
                                    <button
                                        key={index}
                                        onClick={() => handleChoice(option)}
                                        disabled={isWrong || showSuccess}
                                        className={`
                                            relative flex items-center justify-center py-6 md:py-12 rounded-3xl md:rounded-[2.5rem]
                                            transition-all duration-300
                                            ${isWrong ? 'opacity-30 animate-wobble bg-slate-300 shadow-none translate-y-2' : btnColors[index]}
                                            ${!isWrong && !showSuccess ? 'active:translate-y-2 active:shadow-none' : ''}
                                            ${isCorrectAndFound ? 'bg-green-500 scale-110 shadow-[0_0_20px_rgba(34,197,94,0.6)] z-10' : ''}
                                            ${isHidden ? 'opacity-0 scale-50 pointer-events-none' : 'opacity-100'}
                                        `}
                                    >
                                        <span className={`text-5xl md:text-8xl font-black text-white ${isCorrectAndFound ? 'animate-pop' : ''}`}>
                                            {option.value}
                                        </span>
                                        {isCorrectAndFound && (
                                           <Sparkles className="absolute inset-0 m-auto w-full h-full text-yellow-300 animate-ping opacity-60 pointer-events-none" />
                                        )}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
